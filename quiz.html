<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Quiz - Pat.network</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Inclusion de la police -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Lien vers le fichier CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Icônes du site -->
    <link rel="icon" type="image/png" href="/icon/favicon-48x48.png" sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="/icon/favicon.svg" />
    <link rel="shortcut icon" href="/icon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="MyWebSite" />
    <link rel="manifest" href="/icon/site.webmanifest" />
    
    <!-- Styles supplémentaires si nécessaire -->
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #f0f0f0;
        }
        .iframe-container {
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .back-button {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px 20px;
            background-color: #ffffffcc;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .back-button:hover {
            background-color: #ffffff;
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="window.history.back();">← Retour</button>
    <div class="iframe-container">
        <iframe src="https://quizforge-ai.streamlit.app" title="Quiz App"></iframe>
    </div>
</body>
</html>

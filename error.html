<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Pat.network</title>
    <style>
        html {
            background-color: white;
        }

        html.dark-theme {
            background-color: black;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        html.dark-theme body {
            color: #f5f5f5;
        }

        .error-container {
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            margin: 0;
            line-height: 1;
        }

        .error-message {
            font-size: 1.5rem;
            margin: 1rem 0;
        }

        .error-description {
            color: #666;
            margin-bottom: 2rem;
        }

        html.dark-theme .error-description {
            color: #999;
        }

        .home-link {
            color: inherit;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 2px solid currentColor;
            border-radius: 4px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .home-link:hover {
            background-color: currentColor;
            color: var(--bg-color);
        }

        html:not(.dark-theme) .home-link:hover {
            --bg-color: white;
        }

        html.dark-theme .home-link:hover {
            --bg-color: black;
        }

        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            padding: 10px;
        }
    </style>
</head>
<body>
    <button id="theme-toggle">🌙</button>

    <div class="error-container">
        <h1 class="error-code" id="error-code">404</h1>
        <div class="error-message" id="error-message">Page Not Found</div>
        <p class="error-description" id="error-description">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="home-link">Return Home</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('theme-toggle');
            const html = document.documentElement;

            // Fonction pour définir le thème
            function setTheme(theme) {
                if (theme === 'dark') {
                    html.classList.add('dark-theme');
                    themeToggle.textContent = '☀️';
                } else {
                    html.classList.remove('dark-theme');
                    themeToggle.textContent = '🌙';
                }
            }

            // Récupérer et appliquer le thème stocké
            let storedTheme = localStorage.getItem('theme');
            if (storedTheme) {
                setTheme(storedTheme);
            }

            // Toggle du thème
            themeToggle.addEventListener('click', () => {
                const currentTheme = html.classList.contains('dark-theme') ? 'dark' : 'light';
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                setTheme(newTheme);
                localStorage.setItem('theme', newTheme);
            });

            // Gestion du code d'erreur
            const urlParams = new URLSearchParams(window.location.search);
            const errorCode = urlParams.get('code') || '404';
            
            const errorMessages = {
                '400': 'Bad Request',
                '401': 'Unauthorized',
                '403': 'Forbidden',
                '404': 'Page Not Found',
                '500': 'Internal Server Error',
                '502': 'Bad Gateway',
                '503': 'Service Unavailable',
                '504': 'Gateway Timeout'
            };

            const errorDescriptions = {
                '400': 'The request could not be understood by the server.',
                '401': 'Authentication is required to access this resource.',
                '403': 'You don\'t have permission to access this resource.',
                '404': 'The page you\'re looking for doesn\'t exist or has been moved.',
                '500': 'Something went wrong on our end. Please try again later.',
                '502': 'The server received an invalid response from the upstream server.',
                '503': 'The service is temporarily unavailable. Please try again later.',
                '504': 'The server timed out waiting for another server\'s response.'
            };

            document.getElementById('error-code').textContent = errorCode;
            document.getElementById('error-message').textContent = errorMessages[errorCode] || 'Unknown Error';
            document.getElementById('error-description').textContent = errorDescriptions[errorCode] || 'An unexpected error occurred.';
        });
    </script>
</body>
</html>
